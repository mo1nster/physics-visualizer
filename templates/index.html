<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Physics Visualizer</title>
    <style>
        :root { --bg-color: #121212; --text-color: #e0e0e0; --accent: #00bcd4; --card-bg: #1e1e1e; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); transition: background 0.3s; }
        
        /* UI Overlays */
        .ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(30, 30, 30, 0.8); padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-width: 400px; }
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }
        p.credit { font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px; }
        a { color: var(--accent); text-decoration: none; }
        
        /* Inputs & Buttons */
        textarea { width: 100%; height: 80px; background: #2c2c2c; border: 1px solid #444; color: #fff; border-radius: 6px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        textarea:focus { outline: none; border-color: var(--accent); }
        button { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #26c6da; }
        
        /* 3D Container */
        #container { width: 100vw; height: 100vh; }
        
        /* Loading overlay */
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; color: var(--accent); font-size: 2rem; display: none; z-index: 200; }
        
        /* Footer Credit */
        .footer-credit { position: absolute; bottom: 10px; left: 10px; font-size: 0.75rem; opacity: 0.5; z-index: 100;}
    </style>
</head>
<body>

    <div id="loading">Visualizing in 3D...</div>

    <div class="ui">
        <h1>3D Physics Visualizer</h1>
        <p class="credit">Powered by Rana Ibrahim</p>
        <textarea id="physicsInput" placeholder="E.g., A 10 kg block on a 30 degree frictionless incline..."></textarea>
        <button onclick="getAndVisualize()">Visualize in 3D</button>
        <p id="statusText" style="font-size: 0.9rem; margin-top: 10px;"></p>
    </div>

    <div class="footer-credit">Made by <a href="https://www.instagram.com/mo1nsterrr/" target="_blank">Rana Ibrahim</a></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- THREE.JS SETUP ---
        let scene, camera, renderer, controls, blockMesh, groundMesh;
        
        function initThree() {
            scene = new THREE.Scene();
            // Darker background for the scene itself
            scene.background = new THREE.Color(0x050505);
            
            // Perspective Camera (Field of View, Aspect Ratio, Near, Far)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10); // Set initial camera position

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Enable shadows
            document.getElementById('container').appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Smooth movement

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040); // Soft overall light
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Ground Plane (Incline) - Will be rotated later
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.DoubleSide });
            groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
            groundMesh.rotation.x = -Math.PI / 2; // Lay flat initially
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            // 3D Block
            const blockGeometry = new THREE.BoxGeometry(2, 1, 1); // Width, Height, Depth
            const blockMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 }); // Red
            blockMesh = new THREE.Mesh(blockGeometry, blockMaterial);
            blockMesh.castShadow = true;
            blockMesh.visible = false; // Hide until data arrives
            scene.add(blockMesh);

            // Handle Resize
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required if damping is enabled
            renderer.render(scene, camera);
        }

        initThree();
        animate();

        // --- APP LOGIC ---
        async function getAndVisualize() {
            const input = document.getElementById('physicsInput').value;
            if(!input) return alert("Please enter a problem description.");
            
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('statusText').innerText = "Asking AI...";

            try {
                // Call backend API
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({numerical: input})
                });
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if(data.error) {
                     document.getElementById('statusText').innerText = "Error: " + data.error;
                     return console.error(data.error);
                }

                document.getElementById('statusText').innerText = `Visualizing: Mass=${data.kg}, Angle=${data.angle}°`;
                
                // Update 3D Scene based on data
                update3DScene(data);

            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('statusText').innerText = "System Error. Check console.";
                console.error(e);
            }
        }

        function update3DScene(data) {
            // Convert Degrees to Radians
            const angleRad = (data.angle * Math.PI) / 180;
            
            // 1. Rotate the Ground Plane
            groundMesh.rotation.x = -Math.PI / 2 - angleRad; // Reset and apply new angle

            // 2. Position the Block
            // We need to calculate how high up the slope the block goes.
            // It's sitting *on* the plane, so its Y position depends on the sin of the angle.
            // The block is 1 unit tall (geometry is Box(2,1,1)), so we lift it half its height *perp* to slope.
            const slopeLength = 0; // Distance up slope from origin, leave at 0 for now
            const blockHalfHeight = 0.5;

            // Position relative to rotated plane
            blockMesh.rotation.z = -angleRad; // Rotate block to match slope
            
            // Calculate position on hypotenuse (sin/cos)
            const xPos = slopeLength * Math.cos(angleRad);
            const yPos = (slopeLength * Math.sin(angleRad)) + blockHalfHeight;

            blockMesh.position.set(xPos, yPos, 0);
            
            blockMesh.visible = true; // Show the block
        }
    </script>
    
    <div id="container"></div>

</body>
</html>
